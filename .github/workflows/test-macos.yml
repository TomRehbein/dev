name: macOS port validation

on:
  push:
    branches: [macos]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------------
  # Fast job: validate script logic without installing anything.
  # Catches broken require_os guards, syntax errors, and dry-run path issues.
  # -------------------------------------------------------------------------
  dry-run:
    name: Dry run (logic)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: run --dry
        run: ./run --dry

      - name: dev-env --dry
        run: ./dev-env --dry

  # -------------------------------------------------------------------------
  # Full install: runs every runs/ script on a real macOS M-series runner,
  # then deploys dotfiles and runs 99-checks to verify the result.
  # Homebrew and Xcode CLT are pre-installed on macos-latest — install.sh
  # bootstrap steps are skipped; we call ./run and ./dev-env directly.
  # -------------------------------------------------------------------------
  install:
    name: Full install + verify
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Only the download cache is safe to restore. Caching /opt/homebrew/Cellar
      # restores kegs WITHOUT their bin symlinks, so `brew list` reports tools
      # as installed while the binaries are missing from PATH.
      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-${{ hashFiles('runs/01-libs', 'runs/02-tmux') }}
          restore-keys: brew-${{ runner.os }}-

      - name: Install tools
        run: ./run

      - name: Deploy dotfiles
        run: ./dev-env

      - name: Verify environment (99-checks)
        run: ./runs/99-checks
